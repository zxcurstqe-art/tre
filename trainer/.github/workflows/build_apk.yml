name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openjdk-17-jdk-headless autoconf libtool cmake libffi-dev libssl-dev git zip unzip
      - run: pip install buildozer cython virtualenv
      - run: buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
